<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoJump - Coleta de Lixo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            background-color: #fff;
            width: 100vw;
            height: 100vh;
            max-width: 400px;
            max-height: 600px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            display: none;
            z-index: 20;
        }

        h1 { color: #2e7d32; margin-bottom: 10px; }
        #final-score { font-size: 24px; font-weight: bold; color: #2979ff; margin: 15px 0; }
        .score-detail { font-size: 18px; color: #666; margin-bottom: 5px; }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="game-over">
            <h1>Fim de Jogo!</h1>
            <p id="final-score">Lixos Coletados: 0</p>
            <p class="score-detail" id="height-score">Altura: 0px</p>
            <button class="btn" onclick="resetGame()">Tentar Novamente</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreText = document.getElementById('final-score');
        const heightScoreText = document.getElementById('height-score');

        // Áudio
        const musicaFundo = new Audio('musica.mp3');
        musicaFundo.loop = true;
        let musicaIniciada = false;
        let audioDesbloqueado = false;

        function unlockAudio() {
            if (!audioDesbloqueado) {
                musicaFundo.play().then(() => {
                    musicaFundo.pause();
                    audioDesbloqueado = true;
                }).catch(e => console.log("Aguardando interação..."));
            }
        }

        // Imagens
        const imgPersonagem = new Image();
        imgPersonagem.src = 'personagem.png';
        const imgPlataforma = new Image();
        imgPlataforma.src = 'plataforma1.png';
        const imgFundo = new Image();
        imgFundo.src = 'fundo.jpg';
        const imgLixo = new Image();
        imgLixo.src = 'lixo.png'; // Sua imagem de lixo coletável

        // Configurações
        let forcaPulo = -20;
        let gravidade = 1.2;
        let numPlataformas = 10;
        let jogoAtivo = true;
        
        let velocidadeY = 0;
        let velocidadeX = 0;
        let alturaTotalPercorrida = 0; 
        let lixosColetados = 0; // Nova pontuação
        let faseAtual = 1;
        const alturaSeguranca = 90;

        const configFases = {
            1: { alturaMin: 0, atrito: 0.90, aceleracao: 1.6, gravidade: 1.2 },
            2: { alturaMin: 1300, atrito: 0.94, aceleracao: 1.4, gravidade: 1.3 },
            3: { alturaMin: 2600, atrito: 0.98, aceleracao: 1.2, gravidade: 1.4 },
            4: { alturaMin: 3900, atrito: 1.02, aceleracao: 1.0, gravidade: 1.5 },
            5: { alturaMin: 5200, atrito: 1.06, aceleracao: 0.8, gravidade: 1.6 }
        };

        const alturaRealImagem = 6500;
        const larguraRealImagem = 320;

        const personagem = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 100,
            largura: 40,
            altura: 40
        };

        let plataformas = [];
        const larguraPlatFixa = 70;
        const alturaPlatFixa = 20;

        function criarPlataformas() {
            plataformas = [];
            for (let i = 0; i < numPlataformas; i++) {
                let platY = (canvas.height / numPlataformas) * i;
                let temLixo = Math.random() > 0.7; // 30% de chance de ter lixo
                
                plataformas.push({
                    x: Math.random() * (canvas.width - larguraPlatFixa),
                    y: platY,
                    largura: larguraPlatFixa,
                    altura: alturaPlatFixa,
                    lixo: temLixo ? { coletado: false, largura: 25, altura: 25 } : null
                });
            }
            // Plataforma inicial garantida sem lixo
            plataformas[numPlataformas - 1].x = personagem.x - 10;
            plataformas[numPlataformas - 1].y = personagem.y + 50;
            plataformas[numPlataformas - 1].lixo = null;
        }

        // Controles
        const teclas = {};
        window.addEventListener('keydown', e => teclas[e.code] = true);
        window.addEventListener('keyup', e => teclas[e.code] = false);

        window.addEventListener('deviceorientation', (event) => {
            if (!jogoAtivo) return;
            let tilt = event.gamma; 
            if (tilt !== null) {
                let config = configFases[faseAtual];
                velocidadeX += (tilt * 0.1) * config.aceleracao; 
            }
        });

        window.addEventListener('touchstart', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        }, { once: true });

        function update() {
            if (!jogoAtivo) return;

            let config = configFases[faseAtual];

            if (teclas['ArrowLeft']) velocidadeX -= config.aceleracao;
            else if (teclas['ArrowRight']) velocidadeX += config.aceleracao;
            
            velocidadeX *= config.atrito;
            personagem.x += velocidadeX;

            if (personagem.x + personagem.largura < 0) personagem.x = canvas.width;
            if (personagem.x > canvas.width) personagem.x = -personagem.largura;

            velocidadeY += gravidade;
            personagem.y += velocidadeY;

            // Zona de Segurança
            if (alturaTotalPercorrida < alturaSeguranca && personagem.y + personagem.altura > canvas.height) {
                personagem.y = canvas.height - personagem.altura;
                velocidadeY = forcaPulo;
                if (!musicaIniciada && audioDesbloqueado) { musicaFundo.play(); musicaIniciada = true; }
            }

            // Movimento da Câmera
            if (personagem.y < canvas.height / 2 && velocidadeY < 0) {
                let deslocamento = Math.abs(velocidadeY);
                personagem.y = canvas.height / 2;
                alturaTotalPercorrida += deslocamento;
                
                plataformas.forEach(plat => {
                    plat.y += deslocamento;
                    if (plat.y > canvas.height) {
                        plat.y = 0 - Math.random() * 40;
                        plat.x = Math.random() * (canvas.width - larguraPlatFixa);
                        // Novo lixo na plataforma reciclada
                        plat.lixo = Math.random() > 0.7 ? { coletado: false, largura: 25, altura: 25 } : null;
                    }
                });
                
                for (let i = 5; i >= 1; i--) {
                    if (alturaTotalPercorrida >= configFases[i].alturaMin) {
                        faseAtual = i;
                        gravidade = configFases[i].gravidade;
                        break;
                    }
                }
            }

            // Colisão com Plataformas e Lixos
            plataformas.forEach(plat => {
                // Pulo na plataforma
                if (velocidadeY > 0 &&
                    personagem.x < plat.x + plat.largura &&
                    personagem.x + personagem.largura > plat.x &&
                    personagem.y + personagem.altura > plat.y &&
                    personagem.y + personagem.altura < plat.y + plat.altura + velocidadeY
                ) {
                    velocidadeY = forcaPulo; 
                    if (!musicaIniciada && audioDesbloqueado) { musicaFundo.play(); musicaIniciada = true; }
                }

                // Coleta de Lixo
                if (plat.lixo && !plat.lixo.coletado) {
                    let lixoX = plat.x + (plat.largura / 2) - (plat.lixo.largura / 2);
                    let lixoY = plat.y - plat.lixo.altura;

                    if (
                        personagem.x < lixoX + plat.lixo.largura &&
                        personagem.x + personagem.largura > lixoX &&
                        personagem.y < lixoY + plat.lixo.altura &&
                        personagem.y + personagem.altura > lixoY
                    ) {
                        plat.lixo.coletado = true;
                        lixosColetados++;
                    }
                }
            });

            if (personagem.y > canvas.height && alturaTotalPercorrida >= alturaSeguranca) {
                gameOver();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fundo
            try {
                if (imgFundo.complete && imgFundo.naturalWidth !== 0) {
                    let sourceY = alturaRealImagem - canvas.height - (alturaTotalPercorrida % (alturaRealImagem - canvas.height));
                    ctx.drawImage(imgFundo, 0, sourceY, larguraRealImagem, canvas.height, 0, 0, canvas.width, canvas.height);
                } else {
                    ctx.fillStyle = '#e3f2fd';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            } catch(e) {}

            // Plataformas e Lixos
            plataformas.forEach(plat => {
                try {
                    if (imgPlataforma.complete && imgPlataforma.naturalWidth !== 0) {
                        ctx.drawImage(imgPlataforma, plat.x, plat.y, plat.largura, plat.altura);
                    } else {
                        ctx.fillStyle = '#66bb6a';
                        ctx.fillRect(plat.x, plat.y, plat.largura, plat.altura);
                    }

                    // Desenhar Lixo
                    if (plat.lixo && !plat.lixo.coletado) {
                        let lixoX = plat.x + (plat.largura / 2) - (plat.lixo.largura / 2);
                        let lixoY = plat.y - plat.lixo.altura;
                        if (imgLixo.complete && imgLixo.naturalWidth !== 0) {
                            ctx.drawImage(imgLixo, lixoX, lixoY, plat.lixo.largura, plat.lixo.altura);
                        } else {
                            ctx.fillStyle = '#ffeb3b';
                            ctx.fillRect(lixoX, lixoY, plat.lixo.largura, plat.lixo.altura);
                        }
                    }
                } catch(e) {}
            });

            // Personagem
            try {
                if (imgPersonagem.complete && imgPersonagem.naturalWidth !== 0) {
                    ctx.drawImage(imgPersonagem, personagem.x, personagem.y, personagem.largura, personagem.altura);
                } else {
                    ctx.fillStyle = '#f44336';
                    ctx.fillRect(personagem.x, personagem.y, personagem.largura, personagem.altura);
                }
            } catch(e) {}
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            jogoAtivo = false;
            gameOverScreen.style.display = 'flex';
            finalScoreText.innerText = `Lixos Coletados: ${lixosColetados}`;
            heightScoreText.innerText = `Altura Alcançada: ${Math.floor(alturaTotalPercorrida)}px`;
            musicaFundo.pause();
            musicaFundo.currentTime = 0;
            musicaIniciada = false;
        }

        function resetGame() {
            personagem.x = canvas.width / 2 - 20;
            personagem.y = canvas.height - 100;
            velocidadeY = 0;
            velocidadeX = 0;
            alturaTotalPercorrida = 0;
            lixosColetados = 0;
            faseAtual = 1;
            gravidade = configFases[1].gravidade;
            jogoAtivo = true;
            gameOverScreen.style.display = 'none';
            criarPlataformas();
        }

        criarPlataformas();
        gameLoop();
    </script>
</body>
</html>
