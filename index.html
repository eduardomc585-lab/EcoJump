<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EcoJump - Versão 77.7777.7 Mobile Fix</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #000; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; touch-action: none;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; display: none; z-index: 20;
            padding: 20px;
        }

        #logo-img { max-width: 180px; margin-bottom: 20px; }
        h1 { color: #2e7d32; margin-bottom: 5px; font-size: 28px; }
        #final-score { font-size: 24px; font-weight: bold; color: #2979ff; margin: 10px 0; }
        #fase-info { font-size: 20px; color: #2e7d32; font-weight: bold; margin-bottom: 10px; }
        #fase-frase { font-size: 18px; font-style: italic; color: #555; max-width: 85%; line-height: 1.4; margin-bottom: 25px; }

        .btn {
            padding: 18px 50px; font-size: 22px; cursor: pointer; background-color: #4caf50;
            color: white; border: none; border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="game-over">
            <img src="logo.png" id="logo-img" alt="EcoJump Logo">
            <h1>Fim de Jogo!</h1>
            <p id="final-score">Coletas: 0</p>
            <div id="fase-info">Fase Alcançada: 1</div>
            <p id="fase-frase">"Cada lixo jogado no chão é uma ferida no planeta"</p>
            <button class="btn" onclick="resetGame()">Tentar Novamente</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreText = document.getElementById('final-score');
        const faseInfoText = document.getElementById('fase-info');
        const faseFraseText = document.getElementById('fase-frase');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- ÁUDIO ---
        const musicaFundo = new Audio('musica.mp3');
        musicaFundo.loop = true;
        let musicaIniciada = false;
        let audioDesbloqueado = false;

        function unlockAudio() {
            if (!audioDesbloqueado) {
                musicaFundo.play().then(() => { musicaFundo.pause(); audioDesbloqueado = true; })
                .catch(e => console.log("Aguardando interação..."));
            }
        }

        // --- IMAGENS ---
        const imgPersonagem = new Image(); imgPersonagem.src = 'lixeiro.png';
        const imgFundo = new Image(); imgFundo.src = 'teste.jpg';
        
        const imagensPlataformas = [];
        const imagensColetaveis = {};

        for (let i = 1; i <= 5; i++) {
            const p = new Image(); p.src = `plataforma${i}.png`; 
            imagensPlataformas[i] = p;
            for (let j = 1; j <= 5; j++) {
                const img = new Image();
                let prefixo = (i === 5) ? "limpo" : "lixo";
                img.src = `${i}_${prefixo}${j}.png`;
                imagensColetaveis[`${i}_${j}`] = img;
            }
        }

        const frasesPorFase = {
            1: "Cada lixo jogado no chão é uma ferida no planeta",
            2: "A fumaça das fábricas escurece o céu e ameaça a vida",
            3: "Quando o ar fica doente, toda a vida sofre junto",
            4: "Até o universo sente o impacto da sujeira deixada pela humanidade",
            5: "Com o céu limpo novamente, a natureza pode respirar em paz"
        };

        const configFases = {
            1: { alturaMax: 1200, atrito: 0.90, aceleracao: 1.6, gravidade: 1.1 },
            2: { alturaMax: 2900, atrito: 0.94, aceleracao: 1.4, gravidade: 1.2 },
            3: { alturaMax: 4700, atrito: 0.98, aceleracao: 1.2, gravidade: 1.3 },
            4: { alturaMax: 6400, atrito: 1.02, aceleracao: 1.0, gravidade: 1.4 },
            5: { alturaMax: 8000, atrito: 1.06, aceleracao: 0.8, gravidade: 1.5 }
        };

        const alturaRealImagemFundo = 8000;

        // --- FÍSICA E TAMANHOS ---
        let forcaPulo = -22;
        let gravidade = 1.1;
        let numPlataformas = 12;
        let jogoAtivo = true;
        
        let velocidadeY = 0;
        let velocidadeX = 0;
        let alturaTotalPercorrida = 0; 
        let lixosColetados = 0;
        let faseAtual = 1;
        const alturaSeguranca = 90;

        const personagem = { x: 0, y: 0, largura: 45, altura: 45 };
        let plataformas = [];
        const larguraPlatOriginal = 80;
        const alturaPlatOriginal = 20;

        function criarPlataformas() {
            plataformas = [];
            for (let i = 0; i < numPlataformas; i++) {
                let platY = (canvas.height / numPlataformas) * i;
                let idItem = Math.floor(Math.random() * 5) + 1;
                
                plataformas.push({
                    x: Math.random() * (canvas.width - larguraPlatOriginal),
                    y: platY,
                    largura: larguraPlatOriginal,
                    altura: alturaPlatOriginal,
                    fase: 1,
                    lixo: Math.random() > 0.7 ? { 
                        coletado: false, largura: 30, altura: 30, 
                        fase: 1, id: idItem 
                    } : null
                });
            }
            plataformas[numPlataformas - 1].x = canvas.width / 2 - (larguraPlatOriginal / 2);
            plataformas[numPlataformas - 1].y = canvas.height - 80;
            plataformas[numPlataformas - 1].lixo = null;
            
            personagem.x = plataformas[numPlataformas - 1].x + (larguraPlatOriginal/2) - (personagem.largura/2);
            personagem.y = plataformas[numPlataformas - 1].y - personagem.altura;
        }

        const teclas = {};
        window.addEventListener('keydown', e => teclas[e.code] = true);
        window.addEventListener('keyup', e => teclas[e.code] = false);

        window.addEventListener('deviceorientation', (event) => {
            if (!jogoAtivo) return;
            let tilt = event.gamma; 
            if (tilt !== null) {
                let config = configFases[faseAtual];
                velocidadeX += (tilt * 0.12) * config.aceleracao; 
            }
        });

        window.addEventListener('touchstart', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        }, { once: true });

        function update() {
            if (!jogoAtivo) return;

            let config = configFases[faseAtual];

            if (teclas['ArrowLeft']) velocidadeX -= config.aceleracao;
            else if (teclas['ArrowRight']) velocidadeX += config.aceleracao;
            
            velocidadeX *= config.atrito;
            personagem.x += velocidadeX;

            if (personagem.x + personagem.largura < 0) personagem.x = canvas.width;
            if (personagem.x > canvas.width) personagem.x = -personagem.largura;

            velocidadeY += gravidade;
            personagem.y += velocidadeY;

            if (alturaTotalPercorrida < alturaSeguranca && personagem.y + personagem.altura > canvas.height) {
                personagem.y = canvas.height - personagem.altura;
                velocidadeY = forcaPulo;
                if (!musicaIniciada && audioDesbloqueado) { musicaFundo.play(); musicaIniciada = true; }
            }

            if (personagem.y < canvas.height / 2 && velocidadeY < 0) {
                let deslocamento = Math.abs(velocidadeY);
                personagem.y = canvas.height / 2;

                // --- FIX: NORMALIZAÇÃO DE ALTURA ---
                // Dividimos o deslocamento por um fator (ex: 2.5) para que subir no celular
                // não mude de fase tão rápido quanto antes. Isso simula uma tela menor.
                let fatorEscalaMobile = 2.5; 
                alturaTotalPercorrida += deslocamento / fatorEscalaMobile;
                
                plataformas.forEach(plat => {
                    plat.y += deslocamento;
                    if (plat.y > canvas.height) {
                        plat.y = 0 - Math.random() * 50;
                        plat.x = Math.random() * (canvas.width - plat.largura);
                        plat.fase = faseAtual;
                        let idItemSorteado = Math.floor(Math.random() * 5) + 1;
                        plat.lixo = Math.random() > 0.7 ? { 
                            coletado: false, largura: 30, altura: 30, 
                            fase: faseAtual, id: idItemSorteado 
                        } : null;
                    }
                });
                
                if (alturaTotalPercorrida <= 1200) faseAtual = 1;
                else if (alturaTotalPercorrida <= 2900) faseAtual = 2;
                else if (alturaTotalPercorrida <= 4700) faseAtual = 3;
                else if (alturaTotalPercorrida <= 6400) faseAtual = 4;
                else faseAtual = 5;

                gravidade = configFases[faseAtual].gravidade;
            }

            plataformas.forEach(plat => {
                if (velocidadeY > 0 &&
                    personagem.x < plat.x + plat.largura &&
                    personagem.x + personagem.largura > plat.x &&
                    personagem.y + personagem.altura > plat.y &&
                    personagem.y + personagem.altura < plat.y + plat.altura + velocidadeY
                ) {
                    velocidadeY = forcaPulo; 
                    if (!musicaIniciada && audioDesbloqueado) { musicaFundo.play(); musicaIniciada = true; }
                }

                if (plat.lixo && !plat.lixo.coletado) {
                    let lixoX = plat.x + (plat.largura / 2) - (plat.lixo.largura / 2);
                    let lixoY = plat.y - plat.lixo.altura;
                    if (personagem.x < lixoX + plat.lixo.largura && personagem.x + personagem.largura > lixoX &&
                        personagem.y < lixoY + plat.lixo.altura && personagem.y + personagem.altura > lixoY) {
                        plat.lixo.coletado = true;
                        lixosColetados++;
                    }
                }
            });

            if (personagem.y > canvas.height && alturaTotalPercorrida >= alturaSeguranca) { gameOver(); }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            try {
                if (imgFundo.complete && imgFundo.naturalWidth !== 0) {
                    let proporcao = imgFundo.naturalWidth / canvas.width;
                    let alturaRecorte = canvas.height * proporcao;
                    
                    // O fundo deve acompanhar a altura percorrida NORMALIZADA para bater com as fases
                    // Multiplicamos por 2.5 (o mesmo fator) para o visual bater com a lógica
                    let sourceY = alturaRealImagemFundo - alturaRecorte - ((alturaTotalPercorrida * 2.5) % (alturaRealImagemFundo - alturaRecorte));
                    
                    ctx.drawImage(imgFundo, 0, sourceY, imgFundo.naturalWidth, alturaRecorte, 0, 0, canvas.width, canvas.height);
                } else {
                    ctx.fillStyle = '#e3f2fd'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            } catch(e) {}

            plataformas.forEach(plat => {
                try {
                    let imgP = imagensPlataformas[plat.fase];
                    if (imgP.complete && imgP.naturalWidth !== 0) {
                        ctx.drawImage(imgP, plat.x, plat.y, plat.largura, plat.altura);
                    } else {
                        ctx.fillStyle = '#66bb6a'; ctx.fillRect(plat.x, plat.y, plat.largura, plat.altura);
                    }

                    if (plat.lixo && !plat.lixo.coletado) {
                        let imgL = imagensColetaveis[`${plat.lixo.fase}_${plat.lixo.id}`];
                        let lixoX = plat.x + (plat.largura / 2) - (plat.lixo.largura / 2);
                        let lixoY = plat.y - plat.lixo.altura;
                        if (imgL && imgL.complete && imgL.naturalWidth !== 0) {
                            ctx.drawImage(imgL, lixoX, lixoY, plat.lixo.largura, plat.lixo.altura);
                        } else {
                            ctx.fillStyle = (plat.lixo.fase === 5) ? '#4fc3f7' : '#ffeb3b'; 
                            ctx.fillRect(lixoX, lixoY, plat.lixo.largura, plat.lixo.altura);
                        }
                    }
                } catch(e) {}
            });

            try {
                if (imgPersonagem.complete && imgPersonagem.naturalWidth !== 0) {
                    ctx.drawImage(imgPersonagem, personagem.x, personagem.y, personagem.largura, personagem.altura);
                } else {
                    ctx.fillStyle = '#f44336'; ctx.fillRect(personagem.x, personagem.y, personagem.largura, personagem.altura);
                }
            } catch(e) {}
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        function gameOver() {
            jogoAtivo = false;
            gameOverScreen.style.display = 'flex';
            finalScoreText.innerText = `Coletas: ${lixosColetados}`;
            faseInfoText.innerText = `Fase Alcançada: ${faseAtual}`;
            faseFraseText.innerText = `"${frasesPorFase[faseAtual]}"`;
            musicaFundo.pause(); musicaFundo.currentTime = 0; musicaIniciada = false;
        }

        function resetGame() {
            alturaTotalPercorrida = 0; lixosColetados = 0; faseAtual = 1;
            velocidadeY = 0; velocidadeX = 0; jogoAtivo = true;
            gameOverScreen.style.display = 'none';
            criarPlataformas();
        }

        criarPlataformas();
        gameLoop();
    </script>
</body>
</html>
